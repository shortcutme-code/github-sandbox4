name: Download from Commit & Save to Repo
on:
  push:
    branches:
      - "**"
jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 python3 python3-pip python3-requests ffmpeg curl unzip
          pip3 install yt-dlp

      - name: Install bun
        run: |
          curl -fsSL https://bun.com/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
          echo "BUN_INSTALL_DIR=$HOME/.bun" >> $GITHUB_ENV

      - name: Setup YouTube cookies
        if: success()
        run: |
          echo '${{ secrets.YOUTUBE_COOKIES }}' > youtube_cookies.txt
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Download bunkr module
        run: |
          cat << 'EOF' > bunkr.py
          import os
          import sys
          import json
          import time
          import base64
          import requests
          from math import floor
          from itertools import cycle
          from urllib.parse import urlparse

          BUNKRR_API = "https://bunkr.cr/api/vs"
          BUNKRR_DOMAINS = ("bunkr.si", "bunkr.fi", "bunkr.ru", "bunkr.cr", "bunkr.rip", "bunkrr.su")
          BUNKRR_DOWNLOAD_HEADERS = {
              "User-Agent": "Mozilla/5.0 (X11; Ubuntu; Linux x86_64; rv:136.0) Gecko/20100101 Firefox/136.0",
              "Referer": "https://get.bunkrr.su/",
              "Connection": "keep-alive",
          }
          _offline_subs = set()

          def is_bunkr_url(url: str) -> bool:
              return any(domain in url for domain in BUNKRR_DOMAINS)

          def get_slug(url: str) -> str:
              match = __import__("re").search(r"/([a-zA-Z0-9_-]+)$", url)
              return match.group(1) if match else None

          def fetch_bunkr_api(url: str) -> dict | None:
              slug = get_slug(url)
              if not slug:
                  return None
              payload = {"slug": slug}
              for dom in (BUNKRR_API.split("/")[2], *_offline_subs):
                  try:
                      api_url = f"https://{dom}/api/vs"
                      resp = requests.post(api_url, json=payload, headers=BUNKRR_DOWNLOAD_HEADERS, timeout=30)
                      if resp.status_code == 200:
                          return resp.json()
                      if resp.status_code == 502:
                          _offline_subs.add(dom)
                  except Exception:
                      continue
              return None

          def decrypt_url(api_resp: dict) -> str | None:
              try:
                  timestamp = api_resp["timestamp"]
                  encrypted_bytes = base64.b64decode(api_resp["url"])
                  time_key = floor(timestamp / 3600)
                  secret_key = f"SECRET_KEY_{time_key}"
                  secret_key_bytes = secret_key.encode("utf-8")
                  cycled_key = cycle(secret_key_bytes)
                  decrypted_bytes = bytearray(b ^ next(cycled_key) for b in encrypted_bytes)
                  return decrypted_bytes.decode("utf-8", errors="ignore")
              except Exception:
                  return None

          def download_bunkr(url: str, outdir: str):
              api_resp = fetch_bunkr_api(url)
              if not api_resp:
                  print("ERROR: Failed to fetch Bunkr API", file=sys.stderr)
                  sys.exit(1)
              download_link = decrypt_url(api_resp)
              if not download_link:
                  print("ERROR: Failed to decrypt URL", file=sys.stderr)
                  sys.exit(1)
              parsed = urlparse(download_link)
              filename = parsed.path.rstrip("/").split("/")[-1]
              filepath = os.path.join(outdir, filename)
              resp = requests.get(download_link, headers=BUNKRR_DOWNLOAD_HEADERS, stream=True, timeout=120)
              if resp.status_code != 200:
                  print(f"ERROR: HTTP {resp.status_code}", file=sys.stderr)
                  sys.exit(1)
              total = int(resp.headers.get("Content-Length", 0))
              downloaded = 0
              with open(filepath, "wb") as f:
                  for chunk in resp.iter_content(chunk_size=8192):
                      if chunk:
                          f.write(chunk)
                          downloaded += len(chunk)
                          if total > 0:
                              pct = int(downloaded * 100 / total)
                              print(f"PROGRESS:{pct}", file=sys.stderr)
              print(f"DONE:{filepath}")

          if __name__ == "__main__":
              url = sys.argv[1]
              outdir = sys.argv[2] if len(sys.argv) > 2 else "."
              if is_bunkr_url(url):
                  download_bunkr(url, outdir)
          EOF

      - name: Extract URLs and download files
        shell: bash
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          if echo "$MSG" | grep -qP 'download-zip:'; then
            MODE="zip"
            URL_LINE=$(echo "$MSG" | grep -oP 'download-zip:\s*\K.*')
          elif echo "$MSG" | grep -qP 'download:'; then
            MODE="normal"
            URL_LINE=$(echo "$MSG" | grep -oP 'download:\s*\K.*')
          else
            echo "❌ No download command found in commit message"
            exit 1
          fi

          echo "Mode: $MODE"
          mkdir -p downloads tmp_downloads

          for URL in $URL_LINE; do
            echo "Processing: $URL"

            if echo "$URL" | grep -qE "(bunkr\.si|bunkr\.fi|bunkr\.ru|bunkr\.cr|bunkr\.rip|bunkrr\.su)"; then
              echo "⬇️ Downloading Bunkr: $URL"
              python3 bunkr.py "$URL" "tmp_downloads"

            elif echo "$URL" | grep -qE "(youtube\.com|youtu\.be|twitch\.tv|reddit\.com|ni长沙|pexels|soundcloud)"; then
              echo "⬇️ Downloading with yt-dlp: $URL"
              yt-dlp --cookies youtube_cookies.txt -o "tmp_downloads/%(title)s.%(ext)s" "$URL"

            else
              echo "⬇️ Downloading with aria2: $URL"
              aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=90M \
                --dir="tmp_downloads" \
                "$URL"
            fi
          done

          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="tmp_downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
            zip -j "$ARCHIVE_NAME" tmp_downloads/*
          fi

          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting with zip..."
              zip -s 90m "downloads/${BASENAME}.zip" -j "$FILE"
              echo "✅ Parts: $(ls downloads/${BASENAME}* | wc -l)"
            else
              cp "$FILE" "downloads/$BASENAME"
            fi
          done

          rm -rf tmp_downloads

      - name: Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          git commit -m "Add downloaded files from commit [skip ci]" || echo "Nothing to commit"
          echo "🚀 Pushing to branch: $BRANCH"
          git push origin HEAD:$BRANCH